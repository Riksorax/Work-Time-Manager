services:

  web:
    image: riksorax/work-time-manager-web:latest
    container_name: work-time-manager-web
    restart: unless-stopped
    # Nur intern erreichbar — Caddy spricht direkt mit dem Container
    expose:
      - "80"
    networks:
      - proxy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3

  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - proxy
    depends_on:
      - web

networks:
  proxy:
    driver: bridge

volumes:
  caddy_data:    # Let's Encrypt Zertifikate (persistent!)
  caddy_config:
