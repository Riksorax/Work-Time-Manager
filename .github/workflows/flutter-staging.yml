name: Flutter Android – Staging Build

on:
  push:
    branches:
      - develop

defaults:
  run:
    working-directory: ./mobile

jobs:
  build:
    name: Build & Deploy Staging AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Test
        run: flutter test

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/release.keystore
          if [ ! -s android/app/release.keystore ]; then
            echo "::error::Keystore ist leer oder fehlt – ANDROID_KEYSTORE_BASE64 prüfen!"
            exit 1
          fi

      - name: Create google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode > android/app/google-services.json

      - name: Build Staging AAB
        env:
          ORG_GRADLE_PROJECT_android.signing.storeFile: release.keystore
          ORG_GRADLE_PROJECT_android.signing.storePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ORG_GRADLE_PROJECT_android.signing.keyAlias: ${{ secrets.ANDROID_KEY_ALIAS }}
          ORG_GRADLE_PROJECT_android.signing.keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          flutter build appbundle --release \
            --build-number=${{ github.run_number }} \
            --dart-define=RC_ANDROID_KEY="${{ secrets.RC_ANDROID_KEY }}" \
            --dart-define=RECAPTCHA_SITE_KEY="${{ secrets.RECAPTCHA_SITE_KEY }}"

      - name: Upload AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: work-time-manager-staging-${{ github.run_number }}
          path: mobile/build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error
          retention-days: 7

      - name: Upload to Google Play (Internal Track)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_JSON_KEY }}
          packageName: app.work_time_manager
          releaseFiles: mobile/build/app/outputs/bundle/release/app-release.aab
          track: internal
          status: draft
          releaseNotes: |
            [STAGING] Build ${{ github.run_number }}
            Commit: ${{ github.sha }}
