name: Web — Build & Deploy

on:
  push:
    branches: [main, develop]
    paths:
      - 'web/**'
      - 'firestore.rules'
      - '.github/workflows/deploy-angular.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'web/**'
      - 'firestore.rules'
      - '.github/workflows/deploy-angular.yml'
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ vars.DOCKERHUB_USERNAME }}/work-time-manager-web

jobs:
  # ── 1. Angular Build ────────────────────────────────────────────────────────
  build:
    name: Angular Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js Setup
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Verify Secrets
        run: |
          MISSING_SECRETS=()
          [[ -z "${{ secrets.FIREBASE_API_KEY }}" ]] && MISSING_SECRETS+=("FIREBASE_API_KEY")
          [[ -z "${{ secrets.FIREBASE_APP_ID }}" ]] && MISSING_SECRETS+=("FIREBASE_APP_ID")
          [[ -z "${{ secrets.FIREBASE_PROJECT_ID }}" ]] && MISSING_SECRETS+=("FIREBASE_PROJECT_ID")
          [[ -z "${{ secrets.RC_WEB_KEY }}" ]] && MISSING_SECRETS+=("RC_WEB_KEY")
          
          if [ ${#MISSING_SECRETS[@]} -ne 0 ]; then
            echo "Error: The following secrets are missing: ${MISSING_SECRETS[*]}"
            exit 1
          fi

      - name: Inject environment.ts
        env:
          FIREBASE_API_KEY:             ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN:         ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID:          ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET:      ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID:              ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_MEASUREMENT_ID:      ${{ secrets.FIREBASE_MEASUREMENT_ID }}
          RC_WEB_KEY:                   ${{ secrets.RC_WEB_KEY }}
        run: |
          mkdir -p src/environments
          # In beide Dateien schreiben, um sicherzugehen
          cat > src/environments/environment.ts <<EOF
          export const environment = {
            production: true,
            firebase: {
              apiKey:            '${FIREBASE_API_KEY}',
              authDomain:        '${FIREBASE_AUTH_DOMAIN}',
              projectId:         '${FIREBASE_PROJECT_ID}',
              storageBucket:     '${FIREBASE_STORAGE_BUCKET}',
              messagingSenderId: '${FIREBASE_MESSAGING_SENDER_ID}',
              appId:             '${FIREBASE_APP_ID}',
              measurementId:     '${FIREBASE_MEASUREMENT_ID}',
            },
            rcWebApiKey: '${RC_WEB_KEY}',
          };
          EOF
          cp src/environments/environment.ts src/environments/environment.prod.ts
          
          echo "environment.ts and environment.prod.ts created successfully."
          # Validierung (ohne Keys zu zeigen): Prüfen ob Platzhalter noch da sind
          if grep -q "PLACEHOLDER" src/environments/environment.ts; then
            echo "Error: Placeholders still present in environment.ts"
            exit 1
          fi

      - name: Build (production)
        run: npm run build -- --configuration production --delete-output-path

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist-${{ github.run_id }}
          path: web/dist/work-time-manager-web/browser
          retention-days: 1

  # ── 2. Docker Image bauen & in GHCR pushen ──────────────────────────────────
  docker:
    name: Docker Image
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.push.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist-${{ github.run_id }}
          path: web/dist/work-time-manager-web/browser

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker Metadata (Tags & Labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/feature/angular-web-scaffold' }}

      - name: Build & Push Docker Image
        id: push
        uses: docker/build-push-action@v5
        with:
          context: web
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 3. Hetzner Deploy (main oder feature branch) ────────────────────────────
  deploy:
    name: Deploy → Hetzner
    needs: docker
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/feature/angular-web-scaffold'
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: docker-compose.yml auf Server kopieren
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ vars.HETZNER_HOST }}
          username: ${{ vars.HETZNER_USER }}
          key:      ${{ secrets.HETZNER_SSH_PRIVATE_KEY }}
          source:   server/docker-compose.yml
          target:   ~/projekte/work-time-manager
          strip_components: 1

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ vars.HETZNER_HOST }}
          username: ${{ vars.HETZNER_USER }}
          key:      ${{ secrets.HETZNER_SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ~/projekte/work-time-manager

            # Neues Image ziehen
            docker compose pull work-time-manager-web

            # Container starten/aktualisieren (Traefik läuft separat)
            docker compose up -d --no-deps work-time-manager-web

            # Alte Images aufräumen
            docker image prune -f
