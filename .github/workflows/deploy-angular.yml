name: Web — Build & Deploy

on:
  push:
    branches: [main, develop]
    paths:
      - 'web/**'
      - 'firestore.rules'
      - '.github/workflows/deploy-angular.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'web/**'
      - 'firestore.rules'
      - '.github/workflows/deploy-angular.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/work-time-manager-web

jobs:
  # ── 1. Angular Build ────────────────────────────────────────────────────────
  build:
    name: Angular Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js Setup
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Inject environment.ts
        env:
          FIREBASE_API_KEY:            ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN:        ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID:         ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET:     ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID:             ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_MEASUREMENT_ID:     ${{ secrets.FIREBASE_MEASUREMENT_ID }}
          REVENUECAT_WEB_BILLING_KEY:  ${{ secrets.REVENUECAT_WEB_BILLING_KEY }}
        run: |
          cat > src/environments/environment.ts << EOF
          export const environment = {
            production: true,
            firebase: {
              apiKey:            '${FIREBASE_API_KEY}',
              authDomain:        '${FIREBASE_AUTH_DOMAIN}',
              projectId:         '${FIREBASE_PROJECT_ID}',
              storageBucket:     '${FIREBASE_STORAGE_BUCKET}',
              messagingSenderId: '${FIREBASE_MESSAGING_SENDER_ID}',
              appId:             '${FIREBASE_APP_ID}',
              measurementId:     '${FIREBASE_MEASUREMENT_ID}',
            },
            rcWebApiKey: '${REVENUECAT_WEB_BILLING_KEY}',
          };
          EOF

      - name: Build (production)
        run: npm run build -- --configuration production

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist-${{ github.run_id }}
          path: web/dist/work-time-manager-web/browser
          retention-days: 1

  # ── 2. Docker Image bauen & in GHCR pushen ──────────────────────────────────
  docker:
    name: Docker Image
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.push.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist-${{ github.run_id }}
          path: web/dist/work-time-manager-web/browser

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Metadata (Tags & Labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build & Push Docker Image
        id: push
        uses: docker/build-push-action@v5
        with:
          context: web
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 3. Hetzner Deploy (nur main) ────────────────────────────────────────────
  deploy:
    name: Deploy → Hetzner
    needs: docker
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ vars.HETZNER_HOST }}
          username: ${{ vars.HETZNER_USER }}
          key:      ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

            # Neues Image ziehen
            docker pull ${IMAGE}:latest

            # Alten Container ersetzen (zero-downtime mit --pull always)
            docker stop work-time-manager-web 2>/dev/null || true
            docker rm   work-time-manager-web 2>/dev/null || true

            docker run -d \
              --name work-time-manager-web \
              --restart unless-stopped \
              -p 80:80 \
              ${IMAGE}:latest

            # Alte Images aufräumen
            docker image prune -f
