# Agent 2 + Agent 11 — Security + Deployment
# nginx.conf — Port 8080 (analog zu bestehendem Flutter nginx.conf)

server {
  listen 8080;
  server_name localhost;
  root /usr/share/nginx/html;
  index index.html;

  # ─── Gzip Kompression ────────────────────────────────────────────────────
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_types
    text/plain text/css text/xml text/javascript
    application/x-javascript application/xml+rss
    application/javascript application/json
    application/wasm;

  # ─── SPA-Routing ─────────────────────────────────────────────────────────
  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
  }

  # ─── Statische Assets (lang cachen, immutable) ───────────────────────────
  location ~* \.(js|css|woff|woff2|ttf|svg|ico|png|jpg|webp|webmanifest)$ {
    expires 1y;
    add_header Cache-Control "public, immutable" always;
    access_log off;
  }

  # ─── Service Worker (nie cachen!) ────────────────────────────────────────
  location = /firebase-messaging-sw.js {
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    expires 0;
  }

  # ─── Security Headers (Agent 2) ──────────────────────────────────────────

  # HSTS (nur HTTPS, 1 Jahr)
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  # Clickjacking verhindern (DENY statt SAMEORIGIN — kein iframe nötig)
  add_header X-Frame-Options "DENY" always;

  # MIME-Sniffing verhindern
  add_header X-Content-Type-Options "nosniff" always;

  # XSS-Filter (Legacy-Browser)
  add_header X-XSS-Protection "1; mode=block" always;

  # Referrer-Policy
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # Permissions-Policy (Browser-APIs einschränken)
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(self)" always;

  # Content-Security-Policy
  # Firebase, Google Sign-In, reCAPTCHA, RevenueCat Stripe
  add_header Content-Security-Policy "
    default-src 'self';
    script-src
      'self'
      'unsafe-inline'
      https://www.gstatic.com
      https://apis.google.com
      https://www.google.com
      https://www.googletagmanager.com
      https://js.stripe.com
      https://www.revenuecat.com;
    style-src
      'self'
      'unsafe-inline'
      https://fonts.googleapis.com;
    font-src
      'self'
      https://fonts.gstatic.com;
    connect-src
      'self'
      https://*.googleapis.com
      https://*.firebaseio.com
      wss://*.firebaseio.com
      https://firebaseinstallations.googleapis.com
      https://identitytoolkit.googleapis.com
      https://securetoken.googleapis.com
      https://api.revenuecat.com
      https://api.stripe.com;
    frame-src
      https://www.google.com
      https://js.stripe.com;
    img-src
      'self'
      data:
      https:
      blob:;
    worker-src
      'self'
      blob:;
    manifest-src
      'self';
  " always;
}
