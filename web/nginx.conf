server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Angular SPA — alle Routen auf index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Statische Assets langfristig cachen (Content-Hash im Dateinamen)
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # manifest.json nicht cachen (PWA-Aktualisierungen)
    location = /manifest.json {
        expires -1;
        add_header Cache-Control "no-cache";
    }

    # Sicherheits-Header
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json
               application/xml image/svg+xml application/wasm;
}
