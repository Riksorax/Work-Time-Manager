server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript;
    gzip_disable "MSIE [1-6]\.";

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(self)" always;

    # Content Security Policy (CSP)
    add_header Content-Security-Policy "default-src 'self'; 
        script-src 'self' 'unsafe-eval' https://apis.google.com https://www.gstatic.com https://www.google.com https://js.stripe.com; 
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; 
        font-src 'self' https://fonts.gstatic.com; 
        img-src 'self' data: https://*.googleapis.com https://www.gstatic.com https://lh3.googleusercontent.com; 
        connect-src 'self' https://*.googleapis.com https://*.firebaseio.com https://api.revenuecat.com https://api.stripe.com wss://*.firebaseio.com; 
        frame-src 'self' https://work-time-manager.firebaseapp.com https://www.google.com https://js.stripe.com; 
        worker-src 'self' blob:;
        base-uri 'self';" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache Control for static assets
    location ~* \.(?:ico|css|js|gif|jpe?g|png)$ {
        expires 30d;
        add_header Pragma public;
        add_header Cache-Control "public";
    }
}
